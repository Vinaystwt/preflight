<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PreFlight release verification flow from endpoint discovery to signed verdict</title>
  <desc id="desc">Instrument-style flow from service endpoint through live discovery, bounded buyer proof, settlement and delivery, and RELEASE, BLOCK, or UNKNOWN signed receipt output.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#2A323C" stroke-width="1" opacity=".34"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <style>
      .bg{fill:#0B0E12}.panel{fill:#11161D}.panel2{fill:#151B23}.line{stroke:#2A323C}.violet{stroke:#9B8CFF}.muted{stroke:#84909C}
      .text{fill:#F3F5F7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif}.sub{fill:#AAB3BD;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif}
      .mono{fill:#84909C;font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}.label{font-size:22px;font-weight:700}.small{font-size:16px;font-weight:700;letter-spacing:.12em}.body{font-size:18px}
    </style>
  </defs>

  <rect width="1600" height="900" rx="42" class="bg"/>
  <rect x="32" y="32" width="1536" height="836" rx="34" fill="url(#grid)" opacity=".75"/>
  <circle cx="815" cy="450" r="330" fill="#9B8CFF" opacity=".08" filter="url(#soft)"/>
  <path d="M96 760H1504" class="line" stroke-width="1"/>
  <path d="M96 140H1504" class="line" stroke-width="1"/>

  <g transform="translate(86 70)">
    <rect width="52" height="52" rx="12" fill="#0B0E12" stroke="#2A323C"/>
    <path d="M10 20 H30" stroke="#9B8CFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M10 32 H24" stroke="#84909C" stroke-width="4" stroke-linecap="round"/>
    <circle cx="38" cy="26" r="5.8" fill="none" stroke="#9B8CFF" stroke-width="4"/>
    <text x="72" y="22" class="text" font-size="24" font-weight="700">PreFlight</text>
    <text x="72" y="46" class="mono" font-size="13" letter-spacing=".18em">RELEASE GATE</text>
  </g>

  <g transform="translate(94 262)">
    <rect width="270" height="240" rx="26" class="panel" stroke="#2A323C"/>
    <rect x="28" y="30" width="52" height="52" rx="12" class="panel2" stroke="#2A323C"/>
    <path d="M40 50 H60" stroke="#9B8CFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M40 64 H55" stroke="#84909C" stroke-width="4" stroke-linecap="round"/>
    <circle cx="68" cy="56" r="6" fill="none" stroke="#9B8CFF" stroke-width="4"/>
    <text x="28" y="122" class="text label">Service endpoint</text>
    <text x="28" y="158" class="sub body">Public HTTPS target</text>
    <text x="28" y="190" class="mono" font-size="15">POST /verify-release</text>
  </g>

  <path d="M386 382H505" fill="none" class="violet" stroke-width="3" stroke-linecap="round"/>
  <circle cx="386" cy="382" r="5" fill="#9B8CFF"/>
  <circle cx="505" cy="382" r="5" fill="#9B8CFF"/>

  <g transform="translate(520 220)">
    <rect width="285" height="324" rx="26" class="panel" stroke="#2A323C"/>
    <text x="28" y="54" class="mono small">FREE</text>
    <text x="28" y="96" class="text label">Live discovery</text>
    <g transform="translate(28 132)">
      <path d="M0 0H218" class="line" stroke-width="1"/>
      <circle cx="0" cy="42" r="8" fill="#84909C"/>
      <path d="M18 42H214" class="muted" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="94" r="8" fill="#84909C"/>
      <path d="M18 94H158" class="muted" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="146" r="8" fill="#84909C"/>
      <path d="M18 146H196" class="muted" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="28" y="302" class="sub body">Observed fields + provenance</text>
  </g>

  <path d="M827 382H943" fill="none" class="violet" stroke-width="3" stroke-linecap="round"/>
  <circle cx="827" cy="382" r="5" fill="#9B8CFF"/>
  <circle cx="943" cy="382" r="5" fill="#9B8CFF"/>

  <g transform="translate(958 198)">
    <rect width="315" height="368" rx="26" class="panel" stroke="#2A323C"/>
    <text x="28" y="54" class="mono small" fill="#9B8CFF">PAID CHECK</text>
    <text x="28" y="96" class="text label">Bounded buyer proof</text>
    <g transform="translate(34 130)">
      <circle cx="94" cy="94" r="82" fill="none" stroke="#2A323C" stroke-width="16"/>
      <path d="M94 12a82 82 0 0 1 70 124" fill="none" stroke="#9B8CFF" stroke-width="16" stroke-linecap="round"/>
      <path d="M38 154a82 82 0 0 1-18-93" fill="none" stroke="#84909C" stroke-width="16" stroke-linecap="round"/>
      <path d="M58 92H112" stroke="#9B8CFF" stroke-width="5" stroke-linecap="round"/>
      <path d="M58 116H96" stroke="#84909C" stroke-width="5" stroke-linecap="round"/>
      <circle cx="140" cy="104" r="15" fill="none" stroke="#9B8CFF" stroke-width="5"/>
    </g>
    <text x="28" y="330" class="sub body">Owner attestation + spend caps</text>
  </g>

  <path d="M1295 382H1401" fill="none" class="violet" stroke-width="3" stroke-linecap="round"/>
  <circle cx="1295" cy="382" r="5" fill="#9B8CFF"/>
  <circle cx="1401" cy="382" r="5" fill="#9B8CFF"/>

  <g transform="translate(1028 646)">
    <rect width="245" height="70" rx="18" class="panel2" stroke="#2A323C"/>
    <text x="22" y="31" class="text" font-size="19" font-weight="700">Settlement + delivery</text>
    <text x="22" y="54" class="mono" font-size="13">CRITERION EVIDENCE</text>
  </g>

  <g transform="translate(1410 237)">
    <rect width="118" height="290" rx="28" class="panel" stroke="#2A323C"/>
    <rect x="22" y="30" width="74" height="38" rx="19" fill="#153326" stroke="#55D6A5"/>
    <text x="59" y="55" text-anchor="middle" fill="#55D6A5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Arial,sans-serif" font-size="15" font-weight="800">RELEASE</text>
    <rect x="22" y="92" width="74" height="38" rx="19" fill="#36191F" stroke="#FF6B7A"/>
    <text x="59" y="117" text-anchor="middle" fill="#FF6B7A" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Arial,sans-serif" font-size="15" font-weight="800">BLOCK</text>
    <rect x="15" y="154" width="88" height="38" rx="19" fill="#372B18" stroke="#E7B65C"/>
    <text x="59" y="179" text-anchor="middle" fill="#E7B65C" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Arial,sans-serif" font-size="15" font-weight="800">UNKNOWN</text>
    <path d="M28 230H90" stroke="#9B8CFF" stroke-width="4" stroke-linecap="round"/>
    <path d="M28 254H76" stroke="#84909C" stroke-width="4" stroke-linecap="round"/>
    <circle cx="94" cy="242" r="10" fill="none" stroke="#9B8CFF" stroke-width="4"/>
  </g>

  <g transform="translate(1308 646)">
    <rect width="220" height="70" rx="18" class="panel2" stroke="#2A323C"/>
    <text x="22" y="31" class="text" font-size="19" font-weight="700">Signed receipt</text>
    <text x="22" y="54" class="mono" font-size="13">ED25519</text>
  </g>
</svg>
