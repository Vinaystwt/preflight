name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test -- --run

  web-static:
    name: web static
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npx tsc --noEmit

  browser-smoke:
    name: browser smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test tests/pages.spec.ts tests/check.spec.ts tests/receipt.spec.ts --project=chromium --reporter=list

  cli-package:
    name: cli package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run
      - name: Install packed CLI in a clean project
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          tarball="$(cd packages/cli && npm pack --silent | tail -n 1)"
          tmp="$(mktemp -d)"
          cp "packages/cli/${tarball}" "${tmp}/"
          cp web/tests/fixtures/receipt.json "${tmp}/receipt.json"
          cp web/tests/fixtures/pubkeys.json "${tmp}/pubkeys.json"
          cd "${tmp}"
          npm init -y >/dev/null
          npm install "./${tarball}" >/dev/null
          ./node_modules/.bin/preflight --help
          ./node_modules/.bin/preflight verify --help
          ./node_modules/.bin/preflight verify-receipt --help
          ./node_modules/.bin/preflight verify-receipt receipt.json --pubkeys-file pubkeys.json

  security-audit:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm audit --audit-level=high
        working-directory: web
